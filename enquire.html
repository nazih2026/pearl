<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEARL - Enquire | Islamic clothing and fashionwear</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Main container using CSS Grid -->
    <div class="container">
        
        <!-- LEFT SIDEBAR: Hamburger menu + Navigation -->
        <div class="sidebar">
            <!-- Hidden checkbox to toggle menu -->
            <input type="checkbox" id="menu-toggle">
            <!-- Hamburger icon (label) -->
            <label for="menu-toggle" class="hamburger">☰</label>
            
            <!-- Navigation menu -->
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="aboutus.html">About Us</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="enquire.html">Enquire</a></li>
                <li><a href="contactus.html">Contact Us</a></li>
            </ul>
        </div>

        <!-- RIGHT CONTENT: Logo + Enquire Form -->
        <div class="main-content">
            
            <!-- PEARL Logo Section (Clickable - takes you to Home) -->
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    <h1>PEARL</h1>
                    <p>Islamic clothing and fashionwear</p>
                </a>
            </div>

            <!-- Enquire Content Area -->
            <div style="max-width: 800px; margin: 0 auto; padding: 2rem 1rem;">
                
                <!-- Page Title -->
                <h1 class="about-heading">Enquire</h1>

                <!-- Enquiry Form -->
                <form action="#" method="post" class="enquire-form">
                    
                    <!-- Text Area for Enquiry -->
                    <div style="margin-bottom: 2rem;">
                        <label for="enquiry">Your Enquiry:</label>
                        <textarea id="enquiry" name="enquiry" rows="8" placeholder="Type your enquiry here..."></textarea>
                    </div>

                    <!-- Submit Button -->
                    <div style="text-align: center;">
                        <button type="submit" class="submit-btn">Submit Enquiry</button>
                    </div>
                </form>

            </div>

        </div>
    </div>

</body>
</html>
