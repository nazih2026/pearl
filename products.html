<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEARL - Products | Islamic clothing and fashionwear</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Main container using CSS Grid -->
    <div class="container">
        
        <!-- LEFT SIDEBAR: Hamburger menu + Navigation -->
        <div class="sidebar">
            <!-- Hidden checkbox to toggle menu -->
            <input type="checkbox" id="menu-toggle">
            <!-- Hamburger icon (label) -->
            <label for="menu-toggle" class="hamburger">☰</label>
            
            <!-- Navigation menu -->
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="aboutus.html">About Us</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="enquire.html">Enquire</a></li>
                <li><a href="contactus.html">Contact Us</a></li>
            </ul>
        </div>

        <!-- RIGHT CONTENT: Logo + Products -->
        <div class="main-content">
            
            <!-- PEARL Logo Section (Clickable - takes you to Home) -->
            <div class="logo">
                <a href="index.html" style="text-decoration: none; color: inherit;">
                    <h1>PEARL</h1>
                    <p>Islamic clothing and fashionwear</p>
                </a>
            </div>

            <!-- ===== NEW COLLECTION ===== -->
            <div class="collection-section">
                <h2 class="section-heading">New Collection</h2>
                
                <!-- Row 1 -->
                <div class="product-grid">
                    <div class="product-item">
                        <img src="img/new-1.jpeg" alt="New collection item 1">
                    </div>
                    <div class="product-item">
                        <img src="img/new-2.jpeg" alt="New collection item 2">
                    </div>
                    <div class="product-item">
                        <img src="img/new-3.jpeg" alt="New collection item 3">
                    </div>
                </div>
                
                <!-- Row 2 -->
                <div class="product-grid">
                    <div class="product-item">
                        <img src="img/new-4.jpeg" alt="New collection item 4">
                    </div>
                    <div class="product-item">
                        <img src="img/new-5.jpeg" alt="New collection item 5">
                    </div>
                    <div class="product-item">
                        <img src="img/new-6.jpeg" alt="New collection item 6">
                    </div>
                </div>
            </div>

            <!-- ===== WOMEN'S COLLECTION ===== -->
            <div class="collection-section">
                <h2 class="section-heading">Women's Collection</h2>
                
                <!-- Row 1 -->
                <div class="product-grid">
                    <div class="product-item">
                        <img src="img/womens - 1.jpeg" alt="Women's collection item 1">
                    </div>
                    <div class="product-item">
                        <img src="img/womens - 2.jpeg" alt="Women's collection item 2">
                    </div>
                    <div class="product-item">
                        <img src="img/womens - 3.jpeg" alt="Women's collection item 3">
                    </div>
                </div>
                
                <!-- Row 2 -->
                <div class="product-grid">
                    <div class="product-item">
                        <img src="img/womens - 4.jpeg" alt="Women's collection item 4">
                    </div>
                    <div class="product-item">
                        <img src="img/womens - 5.jpeg" alt="Women's collection item 5">
                    </div>
                    <div class="product-item">
                        <img src="img/womens - 6.jpeg" alt="Women's collection item 6">
                    </div>
                </div>
            </div>

            <!-- ===== MEN'S COLLECTION ===== -->
            <div class="collection-section">
                <h2 class="section-heading">Men's Collection</h2>
                
                <!-- Row 1 -->
                <div class="product-grid">
                    <div class="product-item">
                        <img src="img/mens - 1.jpeg" alt="Men's collection item 1">
                    </div>
                    <div class="product-item">
                        <img src="img/mens - 2.jpeg" alt="Men's collection item 2">
                    </div>
                    <div class="product-item">
                        <img src="img/mens - 3.jpeg" alt="Men's collection item 3">
                    </div>
                </div>
                
                <!-- Row 2 -->
                <div class="product-grid">
                    <div class="product-item">
                        <img src="img/mens - 4.jpeg" alt="Men's collection item 4">
                    </div>
                    <div class="product-item">
                        <img src="img/mens - 5.jpeg" alt="Men's collection item 5">
                    </div>
                    <div class="product-item">
                        <img src="img/mens - 6.jpeg" alt="Men's collection item 6">
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
